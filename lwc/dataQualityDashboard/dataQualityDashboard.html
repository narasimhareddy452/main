<template>
  <div class="slds-box slds-theme_default slds-p-around_medium">
    <!-- Header -->
    <h1 class="slds-text-heading_large slds-text-title_bold slds-m-bottom_medium">
                            Data Quality Dashboard
    </h1>
    
    <div class="slds-grid slds-wrap slds-gutters slds-m-bottom_medium">
      <div class="slds-col slds-size_1-of-1 slds-text-align_center">
        <p class="slds-text-title_caps slds-m-bottom_small">Data Quality Score :</p>
        <span class="slds-badge slds-theme_info slds-text-heading_medium">{dataQualityScore}</span>
      </div>
    </div>
    

    <!-- Top Section (Read-only) -->
    <div class="slds-box slds-theme_shade slds-p-around_medium slds-m-bottom_medium">
      <div class="slds-text-align_center slds-m-bottom_small">
        <p class="slds-text-heading_medium slds-text-title_bold">
          Total Inactive Record Owners :
          <span class="slds-badge slds-theme_success slds-text-heading_medium">{inactiveOwnerCount}</span>
        </p>
      </div>
      <div class="slds-text-align_center slds-m-bottom_small">
        <p class="slds-text-heading_medium slds-text-title_bold">
          Total Missing Mandatory Fields :
          <span class="slds-badge slds-theme_warning slds-text-heading_medium">{missingValuesCount}</span>
        </p>
      </div>
      <div class="slds-text-align_center">
        <p class="slds-text-heading_medium slds-text-title_bold">
          Total Data Duplicity :
          <span class="slds-badge slds-theme_error slds-text-heading_medium">{duplicateRecordCount}</span>
        </p>
      </div>
    </div>

    <!-- Bottom Section (Object Selection) -->
    <template if:true={isLoading}>
      <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    <div class="slds-grid slds-wrap slds-gutters">
      <div class="slds-col slds-size_1-of-1 slds-m-bottom_medium">
        <lightning-combobox
          label="Select Object"
          value={selectedObject}
          options={objectOptions}
          onchange={handleObjectChange}>
        </lightning-combobox>
      </div>

      <template if:true={selectedObject}>
        <div class="slds-col slds-size_1-of-3 slds-text-align_center">
          <p class="slds-text-title_caps slds-m-bottom_small">Inactive Record Owners :</p>
          <span class="slds-badge slds-theme_success slds-text-heading_medium">{selectedInactiveOwnerCount}</span>
        </div>
        <div class="slds-col slds-size_1-of-3 slds-text-align_center">
          <p class="slds-text-title_caps slds-m-bottom_small">Missing Mandatory Fields :</p>
          <span class="slds-badge slds-theme_warning slds-text-heading_medium">{selectedMissingValuesCount}</span>
        </div>
        <div class="slds-col slds-size_1-of-3 slds-text-align_center">
          <p class="slds-text-title_caps slds-m-bottom_small">Data Duplicity :</p>
          <span class="slds-badge slds-theme_error slds-text-heading_medium">{selectedDuplicateRecordCount}</span>
        </div>
      </template>
    </div>
  </div>
</template>
